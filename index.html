<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrapbook Flipbook</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: #e9e4dc;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Upload */
#drop-zone {
    margin: 15px;
    padding: 20px;
    border: 2px dashed #b8a99a;
    border-radius: 12px;
    background: #fffaf5;
    cursor: pointer;
}

/* Toolbar */
#toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 10px;
}

button, select {
    padding: 6px 10px;
    border-radius: 10px;
    border: none;
    background: #d8cfc4;
    cursor: pointer;
}

/* Book */
#book {
    width: 340px;
    height: 480px;
    perspective: 1200px;
    position: relative;
}

/* Page */
.page {
    width: 100%;
    height: 100%;
    position: absolute;
    transform-origin: left;
    transition: transform 0.7s ease;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.page.flipped {
    transform: rotateY(-180deg);
}

/* Page content */
.page-content {
    width: 100%;
    height: 100%;
    position: relative;
    padding: 10px;
    background: #fffaf5;
}

/* Photo scrapbook style */
.photo {
    position: absolute;
    width: 70%;
    left: 15%;
    top: 20%;
    transform: rotate(-3deg);
    background: white;
    padding: 10px 10px 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.photo img {
    width: 100%;
    display: block;
}

/* Tape effect */
.tape {
    position: absolute;
    width: 60px;
    height: 20px;
    background: rgba(255,255,200,0.6);
    top: -10px;
    left: calc(50% - 30px);
    transform: rotate(5deg);
}

/* Stickers */
.sticker {
    position: absolute;
    font-size: 28px;
    cursor: grab;
}

/* Cute themes */
.bg1 { background: #fffaf5; }
.bg2 { background: #fcefee; }
.bg3 { background: #eef7f2; }
.bg4 { background: #f0f3fc; }

#controls {
    margin: 10px;
}
</style>
</head>

<body>

<div id="drop-zone">📎 Add Memories</div>
<input type="file" id="file-input" multiple accept="image/*" hidden>

<div id="toolbar">
    <select id="bgSelect">
        <option value="">Paper</option>
        <option value="bg1">Beige</option>
        <option value="bg2">Pink</option>
        <option value="bg3">Green</option>
        <option value="bg4">Blue</option>
    </select>

    <button onclick="addSticker('💖')">💖</button>
    <button onclick="addSticker('🌸')">🌸</button>
    <button onclick="addSticker('✨')">✨</button>
    <button onclick="addSticker('🦋')">🦋</button>
    <button onclick="addSticker('⭐')">⭐</button>
</div>

<div id="book"></div>

<div id="controls">
    <button onclick="prevPage()">←</button>
    <button onclick="nextPage()">→</button>
</div>

<script>
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
const book = document.getElementById('book');
const bgSelect = document.getElementById('bgSelect');

let pages = [];
let current = 0;

/* Upload */
dropZone.onclick = () => fileInput.click();

fileInput.onchange = e => {
    Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
            pages.push({
                photo: ev.target.result,
                stickers: [],
                bg: "bg1"
            });
            render();
        };
        reader.readAsDataURL(file);
    });
};

/* Render */
function render() {
    book.innerHTML = '';

    pages.forEach((p, i) => {
        const page = document.createElement('div');
        page.className = 'page';
        if (i < current) page.classList.add('flipped');

        const content = document.createElement('div');
        content.className = 'page-content ' + (p.bg || '');

        /* Photo frame */
        const frame = document.createElement('div');
        frame.className = 'photo';

        const img = document.createElement('img');
        img.src = p.photo;

        const tape = document.createElement('div');
        tape.className = 'tape';

        frame.appendChild(tape);
        frame.appendChild(img);
        content.appendChild(frame);

        /* Stickers */
        p.stickers.forEach(s => {
            const el = document.createElement('div');
            el.className = 'sticker';
            el.textContent = s.text;
            el.style.left = s.x + 'px';
            el.style.top = s.y + 'px';

            makeDraggable(el, s);
            content.appendChild(el);
        });

        page.appendChild(content);
        book.appendChild(page);
    });
}

/* Navigation */
function nextPage() {
    if (current < pages.length) {
        current++;
        render();
    }
}

function prevPage() {
    if (current > 0) {
        current--;
        render();
    }
}

/* Background */
bgSelect.onchange = () => {
    if (!pages[current]) return;
    pages[current].bg = bgSelect.value;
    render();
};

/* Stickers */
function addSticker(text) {
    if (!pages[current]) return;

    pages[current].stickers.push({
        text,
        x: 50,
        y: 50
    });

    render();
}

/* Drag */
function makeDraggable(el, data) {
    let offsetX, offsetY;

    el.onmousedown = e => {
        offsetX = e.offsetX;
        offsetY = e.offsetY;

        document.onmousemove = e => {
            data.x = e.pageX - book.offsetLeft - offsetX;
            data.y = e.pageY - book.offsetTop - offsetY;
            el.style.left = data.x + 'px';
            el.style.top = data.y + 'px';
        };

        document.onmouseup = () => {
            document.onmousemove = null;
        };
    };
}

render();
</script>

</body>
</html>
