<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrapbook Flipbook</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: #e9e4dc;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Upload */
#drop-zone {
    margin: 15px;
    padding: 20px;
    border: 2px dashed #b8a99a;
    border-radius: 12px;
    background: #fffaf5;
    cursor: pointer;
}

/* Book */
#book {
    width: 340px;
    height: 480px;
    perspective: 1200px;
    position: relative;
}

/* Page */
.page {
    width: 100%;
    height: 100%;
    position: absolute;
    transform-origin: left;
    transition: transform 0.7s ease;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.page.flipped {
    transform: rotateY(-180deg);
}

/* Page content */
.page-content {
    width: 100%;
    height: 100%;
    position: relative;
    padding: 10px;
}

/* Scrapbook paper */
.paper {
    background: #fdfaf6;
    position: relative;
}

.paper::before {
    content: "";
    position: absolute;
    inset: 0;
    background: 
        radial-gradient(circle at 10% 10%, #00000008 2px, transparent 3px),
        radial-gradient(circle at 90% 80%, #00000008 2px, transparent 3px);
    opacity: 0.4;
}

/* Photo frame */
.photo-frame {
    position: absolute;
    width: 65%;
    background: white;
    padding: 10px 10px 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.photo-frame img {
    width: 100%;
}

/* Tape */
.tape {
    position: absolute;
    width: 80px;
    height: 25px;
    background: rgba(255,255,200,0.6);
    top: -12px;
    left: 50%;
    transform: translateX(-50%) rotate(-6deg);
}

/* Torn paper */
.torn {
    position: absolute;
    width: 80%;
    height: 120px;
    background: #fff;
    clip-path: polygon(
        0% 10%, 5% 0%, 95% 0%, 100% 10%,
        95% 100%, 5% 100%, 0% 90%
    );
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Controls */
#controls {
    margin: 10px;
}

button {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: #b8a99a;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="drop-zone">📎 Add Memories</div>
<input type="file" id="file-input" multiple accept="image/*" hidden>

<div id="book"></div>

<div id="controls">
    <button onclick="prevPage()">←</button>
    <button onclick="nextPage()">→</button>
</div>

<script>
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
const book = document.getElementById('book');

let pages = [];
let current = 0;

/* Upload */
dropZone.onclick = () => fileInput.click();

dropZone.ondragover = e => e.preventDefault();

dropZone.ondrop = e => {
    e.preventDefault();
    handleFiles(e.dataTransfer.files);
};

fileInput.onchange = e => handleFiles(e.target.files);

function handleFiles(files) {
    Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) return;

        const reader = new FileReader();
        reader.onload = ev => {
            pages.push({ photo: ev.target.result });
            render();
        };
        reader.readAsDataURL(file);
    });
}

/* Create photo */
function createPhoto(src) {
    const frame = document.createElement('div');
    frame.className = 'photo-frame';

    const img = document.createElement('img');
    img.src = src;

    const tape = document.createElement('div');
    tape.className = 'tape';

    frame.appendChild(tape);
    frame.appendChild(img);

    return frame;
}

/* Layouts */
function layout1(container, photo) {
    const torn = document.createElement('div');
    torn.className = 'torn';
    torn.style.top = '10px';

    const img = createPhoto(photo);
    img.style.top = '80px';
    img.style.left = '15%';
    img.style.transform = 'rotate(-4deg)';

    container.appendChild(torn);
    container.appendChild(img);
}

function layout2(container, photo) {
    const img1 = createPhoto(photo);
    img1.style.top = '60px';
    img1.style.left = '10%';
    img1.style.transform = 'rotate(-6deg)';

    const img2 = createPhoto(photo);
    img2.style.top = '140px';
    img2.style.left = '30%';
    img2.style.transform = 'rotate(5deg)';

    container.appendChild(img1);
    container.appendChild(img2);
}

function layout3(container, photo) {
    const note = document.createElement('div');
    note.className = 'torn';
    note.style.top = '260px';
    note.style.height = '100px';

    const img = createPhoto(photo);
    img.style.top = '60px';
    img.style.left = '20%';

    container.appendChild(img);
    container.appendChild(note);
}

/* Random layout */
function applyLayout(container, photo) {
    const layouts = [layout1, layout2, layout3];
    const pick = layouts[Math.floor(Math.random() * layouts.length)];
    pick(container, photo);
}

/* Decorations */
function addDecor(container) {
    const emojis = ['✨','💖','🌸','🦋'];
    for (let i = 0; i < 3; i++) {
        const el = document.createElement('div');
        el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
        el.style.position = 'absolute';
        el.style.left = Math.random()*260 + 'px';
        el.style.top = Math.random()*420 + 'px';
        container.appendChild(el);
    }
}

/* Render */
function render() {
    book.innerHTML = '';

    pages.forEach((p, i) => {
        const page = document.createElement('div');
        page.className = 'page';
        if (i < current) page.classList.add('flipped');

        const content = document.createElement('div');
        content.className = 'page-content paper';

        applyLayout(content, p.photo);
        addDecor(content);

        page.appendChild(content);
        book.appendChild(page);
    });
}

/* Navigation */
function nextPage() {
    if (current < pages.length) {
        current++;
        render();
    }
}

function prevPage() {
    if (current > 0) {
        current--;
        render();
    }
}
</script>

</body>
</html>
