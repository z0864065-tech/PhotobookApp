<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Scrapbook</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg,#6c6f8a,#4a4e69);
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: sans-serif;
}

/* Upload */
#upload {
    margin: 15px;
    padding: 10px 15px;
    background: white;
    border-radius: 10px;
    cursor: pointer;
}

/* Book container */
.book {
    width: 700px;
    height: 450px;
    position: relative;
    perspective: 2000px;
}

/* Spread */
.spread {
    width: 100%;
    height: 100%;
    display: flex;
    position: absolute;
}

/* Pages */
.page {
    width: 50%;
    height: 100%;
    background: #fdfaf6;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
}

/* Spine */
.page.left {
    border-right: 2px solid #ddd;
}
.page.right {
    border-left: 2px solid #ddd;
}

/* Flip animation */
.spread {
    transform-origin: left;
    transition: transform 0.8s ease;
}
.spread.flipped {
    transform: rotateY(-180deg);
}

/* Photo */
.photo {
    position: absolute;
    width: 120px;
    cursor: grab;
    transform: rotate(-3deg);
}

.photo img {
    width: 100%;
    border: 8px solid white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Tape */
.tape {
    position: absolute;
    width: 50px;
    height: 15px;
    background: rgba(255,255,200,0.7);
    top: -10px;
    left: 30%;
    transform: rotate(-5deg);
}

/* Controls */
#controls {
    margin-top: 15px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    background: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="upload">📎 Upload Photos</div>
<input type="file" id="fileInput" multiple accept="image/*" hidden>

<div class="book" id="book"></div>

<div id="controls">
    <button onclick="prev()">←</button>
    <button onclick="next()">→</button>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const upload = document.getElementById('upload');
const book = document.getElementById('book');

let spreads = [];
let current = 0;

/* Upload */
upload.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
    const files = Array.from(e.target.files);

    for (let i = 0; i < files.length; i += 3) {
        const chunk = files.slice(i, i + 3);

        const readers = chunk.map(file => {
            return new Promise(res => {
                const r = new FileReader();
                r.onload = e => res(e.target.result);
                r.readAsDataURL(file);
            });
        });

        Promise.all(readers).then(images => {
            spreads.push(images);
            render();
        });
    }
};

/* Render */
function render() {
    book.innerHTML = '';

    spreads.forEach((imgs, i) => {
        const spread = document.createElement('div');
        spread.className = 'spread';
        if (i < current) spread.classList.add('flipped');

        const left = document.createElement('div');
        left.className = 'page left';

        const right = document.createElement('div');
        right.className = 'page right';

        imgs.forEach((src, index) => {
            const photo = createPhoto(src);

            if (index % 2 === 0) {
                left.appendChild(photo);
            } else {
                right.appendChild(photo);
            }
        });

        spread.appendChild(left);
        spread.appendChild(right);
        book.appendChild(spread);
    });
}

/* Create draggable photo */
function createPhoto(src) {
    const wrapper = document.createElement('div');
    wrapper.className = 'photo';
    wrapper.style.left = Math.random()*200 + 'px';
    wrapper.style.top = Math.random()*250 + 'px';

    const img = document.createElement('img');
    img.src = src;

    const tape = document.createElement('div');
    tape.className = 'tape';

    wrapper.appendChild(tape);
    wrapper.appendChild(img);

    makeDraggable(wrapper);

    return wrapper;
}

/* Drag */
function makeDraggable(el) {
    let offsetX, offsetY;

    el.onmousedown = (e) => {
        offsetX = e.offsetX;
        offsetY = e.offsetY;

        document.onmousemove = (e) => {
            el.style.left = (e.pageX - book.offsetLeft - offsetX) + 'px';
            el.style.top = (e.pageY - book.offsetTop - offsetY) + 'px';
        };

        document.onmouseup = () => {
            document.onmousemove = null;
        };
    };
}

/* Navigation */
function next() {
    if (current < spreads.length) {
        current++;
        render();
    }
}

function prev() {
    if (current > 0) {
        current--;
        render();
    }
}
</script>

</body>
</html>
